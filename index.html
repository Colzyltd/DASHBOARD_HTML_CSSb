<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="nav-container">
                <p class="abb">cv</p>
                <p class="nav-name">cryptoVault</p>
            </div>
            <p>main menu</p>
            <div>
                <button class="nav-btn">dashboard</button>
                <br>
                <button class="nav-btn">markets</button>
                <br>
                <button class="nav-btn">wallet</button>
                <br>
            </div>
            <div class="switch">
                <button class="btn">logout</button>
            </div>
        </div>
        <div class="header">
            <div class="logo">
                <h1>dashboard</h1>
                <p>Welcome to your dashboard</p>
            </div>
            <div class="info">
                <input type="text" placeholder="search">
                <p class="abb">jd</p>
                <p class="name">john doe</p>
            </div>
        </div>
        <div class="context-1">
            <div class="context-container">
                <h3 class="item-header">portfolio overview</h3>
                <p>1d</p>
                <p>1w</p>
                <p>1m</p>
                <p>1y</p>
            </div>
            <div class="item-footer">
                <p>m</p>
                <p>t</p>
                <p>w</p>
                <p>t</p>
                <p>f</p>
            </div>
        </div>
        <div class="context-2">
            <div class="context-container">
                <h3 class="item-header">asset performance</h3>
                <p>week</p>
                <p>Month</p>
                <p>Year</p>
            </div>
            <div class="bar-container">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
        <div class="context-3">item 3</div>
        <div class="context-4">item 4</div>
        <div class="context-5">item 5</div>
        <div class="context-6">item 6</div>
        <div class="sidebar-1">sidebar 1</div>
        <div class="sidebar-2">sidebar 2</div>
        <div class="sidebar-3">sidebar 3</div>
        <!-- <div class="sidebar-4">sidebar 4</div> -->
    </div>
</body>
</html>
